name: Daily Odisha Gold Price Bot

on:
  schedule:
    # 10:30 UTC corresponds exactly to 16:00 (4:00 PM) IST everyday
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows you to manually trigger the script anytime via GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-node-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Daily Report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
